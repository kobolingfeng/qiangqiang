<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强强</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* ── Custom titlebar ── */
        .titlebar {
            display: none; /* shown via JS when frameless */
            height: 40px;
            background: #16162a;
            flex-shrink: 0;
            align-items: center;
            padding-left: 12px;
        }
        .titlebar.active { display: flex; }
        .titlebar-title {
            flex: 1;
            font-size: 13px;
            color: #999;
            pointer-events: none;
        }
        .titlebar-controls { display: flex; height: 100%; }
        .titlebar-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            color: #999;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
            padding: 0;
            border-radius: 0;
        }
        .titlebar-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .titlebar-btn.close:hover { background: #e81123; color: #fff; }
        .titlebar-btn svg { width: 10px; height: 10px; fill: currentColor; }
        /* ── Content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.25rem; }
        .sub { color: #555; font-size: 0.8rem; margin-bottom: 1.5rem; }
        .section { margin-bottom: 1.25rem; }
        .section h2 { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        button {
            padding: 0.4rem 1rem;
            border: 1px solid #333;
            background: #1e1e3a;
            color: #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
        }
        button:hover { background: #2a2a4e; border-color: #555; color: #fff; }
        button:active { transform: scale(0.97); }
        #output {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #12122a;
            border: 1px solid #222;
            border-radius: 6px;
            color: #6c6;
            font-family: "Cascadia Code", Consolas, monospace;
            font-size: 0.8rem;
            min-height: 3em;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 12em;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <!-- Custom titlebar (shown when frameless) -->
    <div class="titlebar" id="titlebar">
        <span class="titlebar-title">强强</span>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="tb-min" title="最小化">
                <svg viewBox="0 0 10 1"><rect width="10" height="1"/></svg>
            </button>
            <button class="titlebar-btn" id="tb-max" title="最大化">
                <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button class="titlebar-btn close" id="tb-close" title="关闭">
                <svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
        </div>
    </div>

    <div class="content">
    <h1>强强</h1>
    <p class="sub">C++ Win32 · WebView2 · Bun · Vanilla TS — ultra-thin native shell</p>

    <div class="section">
        <h2>Window</h2>
        <div class="actions">
            <button id="btn-title">修改标题</button>
            <button id="btn-size">窗口大小</button>
            <button id="btn-center">居中</button>
            <button id="btn-top">置顶</button>
            <button id="btn-min">最小化</button>
            <button id="btn-max">最大化</button>
        </div>
    </div>

    <div class="section">
        <h2>Dialogs</h2>
        <div class="actions">
            <button id="btn-open">打开文件</button>
            <button id="btn-save">保存文件</button>
            <button id="btn-folder">选择文件夹</button>
            <button id="btn-msg">消息框</button>
            <button id="btn-confirm">确认框</button>
        </div>
    </div>

    <div class="section">
        <h2>System</h2>
        <div class="actions">
            <button id="btn-clip-read">读剪贴板</button>
            <button id="btn-clip-write">写剪贴板</button>
            <button id="btn-tray">创建托盘</button>
            <button id="btn-tray-rm">移除托盘</button>
            <button id="btn-datadir">数据目录</button>
        </div>
    </div>

    <div id="output">Ready.</div>
    </div>
    <script type="module" src="./main.ts"></script>
</body>
</html>
