<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强强文件查看器</title>
    <style>
        :root {
            color-scheme: dark light;
            --bg: #1a1a2e;
            --titlebar-bg: #16162a;
            --surface: #1d1d36;
            --surface-2: #232342;
            --surface-hover: #2a2a4e;
            --border: #333750;
            --text: #eeeeee;
            --muted: #9b9baa;
            --subtle: #666678;
            --accent: #0078d4;
            --accent-text: #ffffff;
            --preview-bg: #111124;
            --code-text: #d7e8ff;
            --danger: #e81123;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            user-select: none;
            transition: background 0.18s ease, color 0.18s ease;
        }
        .titlebar {
            display: none;
            height: 40px;
            background: var(--titlebar-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            align-items: center;
            padding-left: 12px;
            transition: background 0.18s ease, border-color 0.18s ease;
        }
        .titlebar.active { display: flex; }
        .titlebar-title {
            flex: 1;
            font-size: 13px;
            color: var(--muted);
            pointer-events: none;
        }
        .titlebar-controls { display: flex; height: 100%; }
        .titlebar-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s, color 0.12s;
            padding: 0;
            border-radius: 0;
        }
        .titlebar-btn:hover { background: color-mix(in srgb, var(--text) 10%, transparent); color: var(--text); }
        .titlebar-btn.close:hover { background: var(--danger); color: #fff; }
        .titlebar-btn svg { width: 10px; height: 10px; fill: currentColor; }
        .app {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }
        .toolbar {
            display: grid;
            grid-template-columns: auto minmax(180px, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 0;
        }
        .brand h1 {
            font-size: 18px;
            line-height: 1;
            white-space: nowrap;
        }
        .brand span {
            color: var(--subtle);
            font-size: 12px;
            white-space: nowrap;
        }
        .address {
            height: 34px;
            min-width: 0;
            border: 1px solid var(--border);
            background: var(--preview-bg);
            color: var(--text);
            border-radius: 6px;
            padding: 0 10px;
            font: 12px "Cascadia Code", Consolas, monospace;
            outline: none;
        }
        .address:focus,
        .search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent);
        }
        .toolbar-actions,
        .panel-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }
        button,
        select,
        .search {
            height: 34px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        button {
            padding: 0 11px;
            cursor: pointer;
            transition: background 0.14s, border-color 0.14s, transform 0.14s;
            white-space: nowrap;
        }
        button:hover:not(:disabled) {
            background: var(--surface-hover);
            border-color: var(--accent);
        }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled {
            opacity: 0.45;
            cursor: default;
        }
        .primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-text);
        }
        .primary:hover:not(:disabled) {
            background: color-mix(in srgb, var(--accent) 86%, var(--text));
        }
        .main {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(240px, 300px) minmax(360px, 1fr) minmax(230px, 280px);
        }
        .pane {
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 88%, var(--bg));
        }
        .pane:last-child { border-right: 0; }
        .pane-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            min-height: 54px;
        }
        .pane-title {
            min-width: 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .search {
            width: 100%;
            padding: 0 9px;
        }
        .file-list {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 6px;
        }
        .file-row {
            width: 100%;
            min-height: 38px;
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            text-align: left;
            padding: 4px 7px;
        }
        .file-row:hover {
            background: var(--surface-hover);
            border-color: var(--border);
        }
        .file-row.selected {
            background: color-mix(in srgb, var(--accent) 25%, var(--surface));
            border-color: var(--accent);
        }
        .badge {
            width: 38px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            background: color-mix(in srgb, var(--accent) 18%, var(--surface-2));
            color: var(--accent);
            font: 700 10px "Cascadia Code", Consolas, monospace;
        }
        .file-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }
        .file-kind {
            color: var(--subtle);
            font-size: 11px;
            margin-top: 2px;
        }
        .preview {
            flex: 1;
            min-height: 0;
            overflow: auto;
            background: var(--preview-bg);
        }
        .empty,
        .unsupported,
        .error {
            height: 100%;
            display: grid;
            place-items: center;
            padding: 28px;
            color: var(--muted);
            text-align: center;
        }
        .unsupported strong,
        .error strong {
            display: block;
            color: var(--text);
            margin-bottom: 8px;
        }
        .code {
            margin: 0;
            padding: 18px 22px;
            white-space: pre;
            user-select: text;
            font: 13px/1.55 "Cascadia Code", Consolas, monospace;
            color: var(--code-text);
        }
        .details {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 12px;
        }
        .kv {
            display: grid;
            gap: 5px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .kv dt {
            font-size: 11px;
            color: var(--subtle);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .kv dd {
            user-select: text;
            color: var(--text);
            font-size: 13px;
            overflow-wrap: anywhere;
        }
        .statusbar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 7px 12px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-size: 12px;
        }
        body.rz-ew,   body.rz-ew   * { cursor: ew-resize   !important; }
        body.rz-ns,   body.rz-ns   * { cursor: ns-resize   !important; }
        body.rz-nwse, body.rz-nwse * { cursor: nwse-resize !important; }
        body.rz-nesw, body.rz-nesw * { cursor: nesw-resize !important; }
        @media (max-width: 860px) {
            .toolbar { grid-template-columns: 1fr; }
            .main { grid-template-columns: 1fr; grid-template-rows: 220px minmax(280px, 1fr) 210px; }
            .pane { border-right: 0; border-bottom: 1px solid var(--border); }
            .pane:last-child { border-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="titlebar" id="titlebar">
        <span class="titlebar-title">强强文件查看器</span>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="tb-min" title="最小化">
                <svg viewBox="0 0 10 1"><rect width="10" height="1"/></svg>
            </button>
            <button class="titlebar-btn" id="tb-max" title="最大化">
                <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button class="titlebar-btn close" id="tb-close" title="关闭">
                <svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
        </div>
    </div>

    <main class="app">
        <section class="toolbar">
            <div class="brand">
                <h1>文件查看器</h1>
                <span id="theme-pill">System</span>
            </div>
            <input class="address" id="address" spellcheck="false" placeholder="输入路径后回车">
            <div class="toolbar-actions">
                <button id="btn-up" title="上一级">上一级</button>
                <button id="btn-home" title="主目录">主目录</button>
                <button id="btn-open-folder" class="primary">打开文件夹</button>
                <button id="btn-open-file">打开文件</button>
            </div>
        </section>

        <section class="main">
            <aside class="pane">
                <div class="pane-header">
                    <div class="pane-title">文件</div>
                    <div class="panel-actions">
                        <select id="sort">
                            <option value="name">名称</option>
                            <option value="kind">类型</option>
                        </select>
                        <button id="btn-refresh" title="刷新">刷新</button>
                    </div>
                </div>
                <div class="pane-header">
                    <input class="search" id="filter" placeholder="过滤当前目录">
                </div>
                <div class="file-list" id="file-list"></div>
            </aside>

            <section class="pane">
                <div class="pane-header">
                    <div class="pane-title" id="preview-title">预览</div>
                    <div class="panel-actions">
                        <input class="search" id="preview-search" placeholder="搜索文本">
                        <button id="btn-open-external">外部打开</button>
                    </div>
                </div>
                <div class="preview" id="preview">
                    <div class="empty">选择一个文本文件或目录</div>
                </div>
            </section>

            <aside class="pane">
                <div class="pane-header">
                    <div class="pane-title">属性</div>
                    <button id="btn-reveal">定位</button>
                </div>
                <dl class="details" id="details"></dl>
            </aside>
        </section>

        <footer class="statusbar">
            <span id="status-left">Ready</span>
            <span id="status-right">0 项</span>
        </footer>
    </main>

    <script type="module" src="./main.ts"></script>
</body>
</html>
